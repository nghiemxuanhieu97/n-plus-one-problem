spring:
  application:
    name: 01-join-fetch

  main:
    banner-mode: off

  datasource:
    url: jdbc:p6spy:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MYSQL
    username: sa
    password:
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver

  jpa:
    open-in-view: false
    database-platform: org.hibernate.dialect.H2Dialect

    hibernate:
      ddl-auto: create-drop

    properties:
      hibernate:
        format_sql: true
        generate_statistics: true
        query:
          fail_on_pagination_over_collection_fetch: false

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

demo:
  large-dataset: false

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.hibernate.orm.query: WARN
    org.springframework: WARN
    com.example: INFO
    p6spy: INFO