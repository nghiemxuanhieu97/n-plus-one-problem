spring:
  application:
    name: 03-dto-projection
  main:
    banner-mode: off
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        generate_statistics: true
        query:
          fail_on_pagination_over_collection_fetch: false
  h2:
    console:
      enabled: true
      path: /h2-console
demo:
  large-dataset: false

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.hibernate.orm.query: WARN
    org.springframework: WARN
    com.example: INFO
