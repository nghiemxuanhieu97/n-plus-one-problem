spring:
  application:
    name: 04-batch-size
  main:
    banner-mode: off
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    open-in-view: false
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true

demo:
  auto-run: false

server:
  port: 8084

springdoc:
  swagger-ui:
    operations-sorter: method
    tags-sorter: alpha

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.springframework: WARN
    com.example: INFO
